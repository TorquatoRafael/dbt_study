sources:
  - name: jaffle_shop 
    database: raw
    schema: jaffle_shop
    tables:
      - name: customers
        columns:
          - name: id
            tests:
              - not_null
              - unique
      - name: orders
        config:
          freshness:
            warn_after:
              count: 24
              period: day
            error_after:
              count: 48
              period: day
          loaded_at_field: updated_at
